<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея — Виктория & Данила</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #f9f5f0;
      --gold:       #d4a96a;
      --gold-light: #e8cfa0;
      --brown:      #5a4a3a;
      --brown-dark: #3d3028;
      --white:      #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--cream);
      color: var(--brown);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .gal-header {
      background: var(--brown-dark);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .gal-header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(249,245,240,0.65);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.25s;
    }
    .back-link:hover { color: var(--gold); }

    .gal-header-title {
      font-family: 'Great Vibes', cursive;
      font-size: 2rem;
      color: var(--gold);
      line-height: 1;
    }

    .gal-header-sub {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(249,245,240,0.45);
      margin-top: 0.15rem;
    }

    /* ── TOOLBAR ── */
    .gal-toolbar {
      max-width: 1280px;
      margin: 2rem auto 1.5rem;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .gal-count {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
    }

    .gal-toolbar-btns {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.7rem 1.6rem;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--brown);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.25s;
    }
    .btn-upload:hover { background: var(--gold); color: var(--white); }

    #status {
      font-style: italic;
      font-size: 0.9rem;
      color: var(--gold);
    }

    /* ── GRID ── */
    .gal-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    .gal-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    @media (max-width: 900px)  { .gal-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px)  { .gal-grid { grid-template-columns: repeat(2, 1fr); } }

    .gal-item {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: rgba(212,169,106,0.08);
      cursor: pointer;
    }

    .gal-item img,
    .gal-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s ease;
    }
    .gal-item:hover img,
    .gal-item:hover video { transform: scale(1.05); }

    .gal-item .play-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .gal-item .play-icon svg {
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
      opacity: 0.85;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    .gal-item.new { animation: fadeIn 0.5s ease forwards; }

    /* empty state */
    .empty-state {
      grid-column: 1 / -1;
      padding: 5rem 2rem;
      text-align: center;
      opacity: 0.5;
    }
    .empty-state svg { margin-bottom: 1rem; }
    .empty-state p { font-style: italic; font-size: 1.1rem; }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 10, 0.93);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }

    .lb-img-wrap {
      position: relative;
      max-width: 90vw;
      max-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-img-wrap img,
    .lb-img-wrap video {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 46px;
      height: 46px;
      border: 1px solid rgba(212,169,106,0.5);
      background: rgba(0,0,0,0.4);
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 2;
    }
    .lb-btn:hover { background: rgba(212,169,106,0.3); }
    .lb-btn.prev { left: -60px; }
    .lb-btn.next { right: -60px; }

    @media (max-width: 640px) {
      .lb-btn.prev { left: 8px; }
      .lb-btn.next { right: 8px; }
    }

    .lb-close {
      position: fixed;
      top: 1.25rem;
      right: 1.5rem;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(212,169,106,0.4);
      background: transparent;
      color: rgba(249,245,240,0.7);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .lb-close:hover { color: var(--gold); border-color: var(--gold); }

    .lb-counter {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: rgba(249,245,240,0.5);
    }

    /* ── FOOTER ── */
    .gal-footer {
      background: var(--brown-dark);
      color: rgba(249,245,240,0.5);
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .gal-footer span { color: var(--gold); }
  </style>
</head>
<body>

<header class="gal-header">
  <div class="gal-header-left">
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Главная
    </a>
    <div>
      <div class="gal-header-title">Галерея</div>
      <div class="gal-header-sub">Виктория & Данила · 16 июня 2026</div>
    </div>
  </div>
</header>

<div class="gal-toolbar">
  <span class="gal-count" id="gal-count">Загрузка…</span>
  <div class="gal-toolbar-btns">
    <span id="status"></span>
    <button class="btn-upload" onclick="document.getElementById('photo-file').click()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      📷 Фото / Видео
    </button>
    <input type="file" id="photo-file" multiple accept="image/*,video/*" style="display:none">
  </div>
</div>

<div class="gal-wrap">
  <div class="gal-grid" id="gal-grid"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close" aria-label="Закрыть">✕</button>
  <div class="lb-img-wrap">
    <button class="lb-btn prev" id="lb-prev" aria-label="Назад">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img id="lb-img" src="" alt="Фото" style="display:none">
    <video id="lb-video" controls playsinline style="display:none"></video>
    <button class="lb-btn next" id="lb-next" aria-label="Вперёд">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<!-- Модалка имени -->
<div id="gal-name-modal" style="display:none;position:fixed;inset:0;background:rgba(20,12,6,0.7);z-index:3000;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#f9f5f0;border:1px solid rgba(212,169,106,0.4);padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;">
    <p style="font-family:'Great Vibes',cursive;font-size:1.8rem;color:#d4a96a;margin-bottom:1.5rem;">Как вас зовут?</p>
    <input id="gal-uploader-input" type="text" placeholder="Ваше имя" style="width:100%;padding:0.75rem 1rem;border:1px solid rgba(212,169,106,0.38);background:#f9f5f0;font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#5a4a3a;outline:none;margin-bottom:1rem;">
    <button id="gal-name-confirm" style="width:100%;padding:1rem;border:none;background:#d4a96a;color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.05rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;">Продолжить</button>
  </div>
</div>

<footer class="gal-footer">
  <span>Виктория & Данила</span> · 16 июня 2026
</footer>

<script>
  const galGrid   = document.getElementById('gal-grid');
  const countEl   = document.getElementById('gal-count');
  const statusEl  = document.getElementById('status');

  const VIDEO_EXT = /\.(mp4|webm|mov|avi)$/i;

  function isVideo(f) { return VIDEO_EXT.test(f); }

  let photos = [];
  let lbIdx  = 0;

  // ── GRID ──────────────────────────────────
  function makeItem(filename, anim) {
    const wrap = document.createElement('div');
    wrap.className = 'gal-item' + (anim ? ' new' : '');

    if (isVideo(filename)) {
      const vid = document.createElement('video');
      vid.src = `/photos/${encodeURIComponent(filename)}`;
      vid.muted = true;
      vid.loop = true;
      vid.playsInline = true;
      vid.preload = 'metadata';
      vid.style.pointerEvents = 'none';
      wrap.appendChild(vid);
      wrap.addEventListener('mouseenter', () => vid.play().catch(() => {}));
      wrap.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });

      const playIcon = document.createElement('div');
      playIcon.className = 'play-icon';
      playIcon.innerHTML = `<svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="22" r="21" fill="rgba(0,0,0,0.45)" stroke="rgba(212,169,106,0.7)" stroke-width="1.5"/>
        <polygon points="17,13 34,22 17,31" fill="#d4a96a"/>
      </svg>`;
      wrap.appendChild(playIcon);
    } else {
      const img = document.createElement('img');
      img.src = `/photos/${encodeURIComponent(filename)}`;
      img.alt = 'Фото';
      img.loading = 'lazy';
      wrap.appendChild(img);
    }

    wrap.addEventListener('click', () => openLightbox(photos.indexOf(filename)));
    return wrap;
  }

  function updateCount() {
    const total = photos.length;
    if (total === 0) { countEl.textContent = '0 файлов'; return; }
    const vids  = photos.filter(isVideo).length;
    const imgs  = total - vids;
    const parts = [];
    if (imgs)  parts.push(pluralize(imgs,  'фотография','фотографии','фотографий'));
    if (vids)  parts.push(pluralize(vids,  'видео','видео','видео'));
    countEl.textContent = parts.join(', ');
  }

  function renderAll() {
    galGrid.innerHTML = '';
    if (photos.length === 0) {
      galGrid.innerHTML = `<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d4a96a" stroke-width="1.2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <p>Пока нет фото и видео. Загрузите первые!</p>
      </div>`;
      updateCount();
      return;
    }
    photos.forEach(f => galGrid.appendChild(makeItem(f, false)));
    updateCount();
  }

  function pluralize(n, one, few, many) {
    const mod10 = n % 10, mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return `${n} ${one}`;
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return `${n} ${few}`;
    return `${n} ${many}`;
  }

  async function loadAll() {
    try {
      const r = await fetch('/api/photos');
      photos = await r.json();
    } catch { photos = []; }
    renderAll();
  }

  loadAll();

  // ── UPLOAD ────────────────────────────────
  let pendingFiles = [];

  function getUploaderName() { return localStorage.getItem('uploaderName') || ''; }
  function saveUploaderName(n) { localStorage.setItem('uploaderName', n); }

  document.getElementById('photo-file').addEventListener('change', function () {
    pendingFiles = Array.from(this.files);
    this.value = '';
    if (!pendingFiles.length) return;
    const saved = getUploaderName();
    if (saved) {
      doUpload(pendingFiles, saved);
    } else {
      document.getElementById('gal-uploader-input').value = '';
      document.getElementById('gal-name-modal').style.display = 'flex';
      document.getElementById('gal-uploader-input').focus();
    }
  });

  document.getElementById('gal-name-confirm').addEventListener('click', () => {
    const name = document.getElementById('gal-uploader-input').value.trim();
    if (!name) { document.getElementById('gal-uploader-input').style.borderColor = '#c0533a'; return; }
    saveUploaderName(name);
    document.getElementById('gal-name-modal').style.display = 'none';
    doUpload(pendingFiles, name);
  });

  document.getElementById('gal-uploader-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('gal-name-confirm').click();
  });
  document.getElementById('gal-name-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('gal-name-modal'))
      document.getElementById('gal-name-modal').style.display = 'none';
  });

  async function doUpload(files, uploaderName) {
    const safeName = uploaderName.trim().replace(/\s+/g, '_');
    const total = files.length;
    let done = 0;
    statusEl.textContent = `Загружаем…`;

    for (const file of files) {
      try {
        const originalName = file.name.replace(/\.[^.]+$/, '');
        const filename = `${safeName}_${originalName}${file.name.slice(file.name.lastIndexOf('.'))}`;
        const resp = await fetch('/api/upload', {
          method: 'POST',
          headers: {
            'Content-Type': file.type || 'application/octet-stream',
            'X-Filename': encodeURIComponent(filename),
          },
          body: file,
        });
        const json = await resp.json();
        if (!resp.ok) throw new Error(json.error || `HTTP ${resp.status}`);

        photos.push(json.filename);
        const item = makeItem(json.filename, true);
        const empty = galGrid.querySelector('.empty-state');
        if (empty) galGrid.innerHTML = '';
        galGrid.appendChild(item);

        done++;
        statusEl.textContent = `${done} / ${total}`;
        updateCount();
      } catch (e) {
        console.error('upload:', e);
        statusEl.textContent = `Ошибка: ${e.message}`;
      }
    }

    statusEl.textContent = `✓ ${done} сохранено`;
    setTimeout(() => { statusEl.textContent = ''; }, 4000);
  }

  // ── LIGHTBOX ──────────────────────────────
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lb-img');
  const lbVid    = document.getElementById('lb-video');
  const lbCnt    = document.getElementById('lb-counter');

  function openLightbox(idx) {
    lbIdx = idx;
    lightbox.classList.add('open');
    showLb();
  }

  function showLb() {
    const filename = photos[lbIdx];
    lbCnt.textContent = `${lbIdx + 1} / ${photos.length}`;
    document.getElementById('lb-prev').disabled = lbIdx === 0;
    document.getElementById('lb-next').disabled = lbIdx === photos.length - 1;

    if (isVideo(filename)) {
      lbImg.style.display = 'none';
      lbImg.src = '';
      lbVid.style.display = 'block';
      lbVid.src = `/photos/${encodeURIComponent(filename)}`;
      lbVid.load();
    } else {
      lbVid.style.display = 'none';
      lbVid.pause();
      lbVid.src = '';
      lbImg.style.display = 'block';
      lbImg.src = `/photos/${encodeURIComponent(filename)}`;
    }
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lbImg.src = '';
    lbVid.pause();
    lbVid.src = '';
    lbImg.style.display = 'none';
    lbVid.style.display = 'none';
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => { if (lbIdx > 0) { lbIdx--; showLb(); } });
  document.getElementById('lb-next').addEventListener('click', () => { if (lbIdx < photos.length - 1) { lbIdx++; showLb(); } });

  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft'  && lbIdx > 0)               { lbIdx--; showLb(); }
    if (e.key === 'ArrowRight' && lbIdx < photos.length-1) { lbIdx++; showLb(); }
  });
</script>
</body>
</html>
